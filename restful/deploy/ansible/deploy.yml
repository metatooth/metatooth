- hosts: servers

  tasks:
    - name: Ensures {{ build_dir }} dir exists
      file:
        path: "{{ build_dir }}"
        state: directory

    - name: Sync deployment directory
      synchronize:
        src: "{{ src_dir }}/"
        dest: "{{ build_dir }}"
        recursive: yes
        delete: yes

    - name: Install .env file
      become: yes
      template:
        src: ./templates/dotenv.j2
        dest: "{{ build_dir }}/.env"
        owner: root
        group: root
        mode: '0644'

    - name: Run docker compose up
      ansible.builtin.shell:
        cmd: cd {{ build_dir }} && docker compose up -d

    - name: Install metatooth-restful service
      become: yes
      template:
        src: ./templates/systemd-service.j2
        dest: /etc/systemd/system/com.metatooth.restful.service
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start metatooth-restful service
      become: yes
      systemd:
        name: com.metatooth.restful
        state: restarted
        daemon_reload: yes
        enabled: yes

- hosts: balancers

  tasks:

  - name: Install metatooth-restful nginx config
    become: yes
    template:
      src: ./templates/nginx.conf.j2
      dest: /etc/nginx/sites-available/{{ server_name }}
      owner: root
      group: root
      mode: '0644'

  - name: Enable metatooth-restful nginx site
    become: yes
    file:
      src: /etc/nginx/sites-available/{{ server_name }}
      dest: /etc/nginx/sites-enabled/{{ server_name }}
      state: link

  - name: Reload nginx
    become: yes
    systemd:
      name: nginx
      state: reloaded
