- hosts: servers

  tasks:
    - name: Ensure {{ build_dir }} dir exists
      file:
        path: "{{ build_dir }}"
        state: directory

    - name: Sync Magento source
      synchronize:
        src: "{{ playbook_dir }}/../src/"
        dest: "{{ build_dir }}/public_html/"
        rsync_opts:
          - "--exclude=.gitignore"
      tags: sync

    - name: Sync active theme
      synchronize:
        src: "{{ playbook_dir }}/../themes/metatooth/default/"
        dest: "{{ build_dir }}/public_html/app/design/frontend/Metatooth/default/"
        rsync_opts:
          - "--exclude=.gitignore"
      tags: sync

    - name: Copy database dump
      synchronize:
        src: "{{ db_dump_path }}"
        dest: "{{ build_dir }}/magento-final.sql"
      tags: sync

    - name: Ensure /root/.composer dir exists
      become: yes
      file:
        path: /root/.composer
        state: directory
        mode: '0700'

    - name: Deploy composer auth
      become: yes
      copy:
        src: "{{ inventory_dir }}/auth.json"
        dest: /root/.composer/auth.json
        mode: '0600'


    - name: Import database dump
      ansible.builtin.shell:
        cmd: >
          grep -v "^CREATE DATABASE\|^USE " {{ build_dir }}/magento-final.sql |
          sed "s/ DEFINER=\`[^\`]*\`@\`[^\`]*\`//" |
          mysql -h {{ db_host }} -P {{ db_port | default('3306') }}
          -u {{ db_user }} -p{{ db_password }} {{ db_name }}
      tags: import

    - name: Install env.php
      become: yes
      template:
        src: ./templates/env.php.j2
        dest: "{{ build_dir }}/public_html/app/etc/env.php"
        owner: root
        group: root
        mode: '0644'

    - name: Set writable directory permissions
      become: yes
      ansible.builtin.shell:
        cmd: >
          chown -R {{ ansible_user }}:{{ ansible_user }} {{ build_dir }}/public_html/{{ item }} &&
          chmod -R 777 {{ build_dir }}/public_html/{{ item }}
      loop:
        - var
        - pub/static
        - pub/media
        - generated
        - vendor
        - app/etc

    - name: Install refresh script
      template:
        src: ./templates/refresh.j2
        dest: "{{ build_dir }}/refresh"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Install php-fpm.conf
      become: yes
      template:
        src: ./templates/php-fpm.conf.j2
        dest: "{{ build_dir }}/php-fpm.conf"
        owner: root
        group: root
        mode: '0644'

    - name: Install docker-compose.yml
      become: yes
      template:
        src: ./templates/docker-compose.yml.j2
        dest: "{{ build_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: '0644'

    - name: Install nginx.conf
      become: yes
      template:
        src: ./templates/nginx.conf.j2
        dest: "{{ build_dir }}/nginx.conf"
        owner: root
        group: root
        mode: '0644'

    - name: Install .env file
      become: yes
      template:
        src: ./templates/dotenv.j2
        dest: "{{ build_dir }}/.env"
        owner: root
        group: root
        mode: '0600'

    - name: Run docker compose up
      become: yes
      ansible.builtin.shell:
        cmd: cd {{ build_dir }} && docker compose up -d --remove-orphans

    - name: Copy auth.json into phpfpm container
      become: yes
      ansible.builtin.shell:
        cmd: |
          docker exec php-{{ site_slug }}-1 mkdir -p /root/.composer
          docker cp /root/.composer/auth.json php-{{ site_slug }}-1:/root/.composer/auth.json

    - name: Patch zend-code for PHP 7.4 compatibility
      ansible.builtin.shell:
        cmd: >
          sed -i 's/return (string) \$type;/return $type->getName();/'
          {{ build_dir }}/public_html/vendor/zendframework/zend-code/src/Reflection/ParameterReflection.php

    - name: Patch Magento ErrorHandler to ignore E_DEPRECATED (PHP 7.4)
      ansible.builtin.lineinfile:
        path: "{{ build_dir }}/public_html/vendor/magento/framework/App/ErrorHandler.php"
        regexp: '^\s*\$errorNo = \$errorNo & error_reporting\(\);'
        line: "        $errorNo = $errorNo & error_reporting() & ~E_DEPRECATED & ~E_USER_DEPRECATED;"

    - name: Regenerate autoloader (no classmap — allows bootstrap without proxies)
      become: yes
      ansible.builtin.shell:
        cmd: >
          docker exec php-{{ site_slug }}-1
          composer dump-autoload -d /var/www/html

    - name: Compile DI
      become: yes
      ansible.builtin.shell:
        cmd: >
          docker exec php-{{ site_slug }}-1
          php -d error_reporting=24567
          /var/www/html/bin/magento setup:di:compile

    - name: Regenerate autoloader (optimized — now that proxies exist)
      become: yes
      ansible.builtin.shell:
        cmd: >
          docker exec php-{{ site_slug }}-1
          composer dump-autoload --optimize -d /var/www/html

    - name: Run setup:upgrade
      become: yes
      ansible.builtin.shell:
        cmd: >
          docker exec php-{{ site_slug }}-1
          php -d error_reporting=24567
          /var/www/html/bin/magento setup:upgrade --keep-generated

    - name: Deploy static content
      become: yes
      ansible.builtin.shell:
        cmd: >
          docker exec php-{{ site_slug }}-1
          php -d error_reporting=24567
          /var/www/html/bin/magento setup:static-content:deploy -f en_US
        chdir: "{{ build_dir }}"
      tags: static

    - name: Flush Magento cache
      become: yes
      ansible.builtin.shell:
        cmd: >
          docker exec php-{{ site_slug }}-1
          php /var/www/html/bin/magento cache:flush

    - name: Enable SMTP
      become: yes
      ansible.builtin.shell:
        cmd: >
          docker exec php-{{ site_slug }}-1
          php /var/www/html/bin/magento config:set system/smtp/disable 0

    - name: Update Magento base URLs in database
      ansible.builtin.shell:
        cmd: >
          mysql -h {{ db_host }} -P {{ db_port | default('3306') }}
          -u {{ db_user }} -p{{ db_password }} {{ db_name }} -e
          "UPDATE core_config_data SET value='https://{{ site_domain }}/'
          WHERE path LIKE 'web/%/base%url' AND value IS NOT NULL;"
      tags: urls

    - name: Install {{ site_domain }} service
      become: yes
      template:
        src: ./templates/systemd-service.j2
        dest: /etc/systemd/system/com.{{ site_slug }}.service
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start {{ site_domain }} service
      become: yes
      systemd:
        name: com.{{ site_slug }}
        state: restarted
        daemon_reload: yes
        enabled: yes

- hosts: balancers

  tasks:

  - name: Install {{ site_domain }} config
    become: yes
    template:
      src: ./templates/site-nginx.j2
      dest: /etc/nginx/sites-available/{{ site_slug }}-com

  - name: Enable {{ site_domain }}
    become: yes
    file:
      src: /etc/nginx/sites-available/{{ site_slug }}-com
      dest: /etc/nginx/sites-enabled/{{ site_slug }}-com
      state: link

  - name: Restart nginx
    service:
      name: nginx
      state: restarted
    become: yes
