- hosts: servers

  vars:
    service_description: "RESTful API service for the Herbert system"
    container_name: "api-1"

  tasks:
    - name: Sync docker image
      synchronize:
        src: "{{ src_dir }}/herbert_server_latest.tar.gz"
        dest: "{{ deploy_dir }}"

    - name: Load docker image
      shell:
        cmd: docker load < herbert_server_latest.tar.gz
        chdir: "{{ deploy_dir }}"

    - name: Stop running conatiner
      shell:
        cmd: docker container remove --force {{ container_name }}

    - name: Run docker image as container
      shell:
        cmd: >
          docker run -d
          -p 5000:5000
          -e "DATABASE_URL={{ db_url }}"
          --network=herbert-net
          --name={{ container_name }}
          herbert_server:latest

    - name: Install server service
      become: yes
      template:
        src: ./templates/systemd-service.j2
        dest: /etc/systemd/system/herbert-server.service
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start herbert-server service
      become: yes
      systemd:
        name: herbert-server
        state: restarted
        daemon_reload: yes
        enabled: yes
